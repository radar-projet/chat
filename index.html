<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeonChat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* --- VARIABLES ET FOND ANIMÉ --- */
        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --bg-dark: #0a0a12;
            --glass-bg: rgba(20, 20, 35, 0.4);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #05050a, #1a0b2e, #0b1a2e, #05050a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- LA VITRE PRINCIPALE (GLASSMORPHISM) --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 243, 255, 0.1) inset;
            width: 90%;
            max-width: 1000px; /* Plus large pour les PC */
            height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- ÉCRAN DE CONNEXION --- */
        #login-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            z-index: 10;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem); /* S'adapte à l'écran automatiquement */
            margin-bottom: 30px;
            text-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-pink);
            letter-spacing: 3px;
            text-align: center;
        }

        input[type="text"].login-input {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 15px 30px;
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: 0.3s;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        input[type="text"].login-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.3);
            transform: scale(1.05);
        }

        button.neon-btn {
            margin-top: 25px;
            background: transparent;
            color: white;
            font-size: 1.2rem;
            padding: 12px 50px;
            border: 2px solid var(--neon-pink);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4) inset;
        }

        button.neon-btn:hover {
            background: var(--neon-pink);
            box-shadow: 0 0 25px var(--neon-pink) inset, 0 0 40px var(--neon-pink);
            text-shadow: 0 0 5px black;
            transform: translateY(-3px);
        }

        /* --- ÉCRAN DE CHAT --- */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .chat-header {
            padding: 15px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
        }

        .chat-header span {
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 8px var(--neon-blue);
        }

        #logout-btn {
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.4);
            color: #ff4444;
            cursor: pointer;
            border-radius: 8px;
            padding: 8px 15px;
            transition: 0.3s;
            font-weight: bold;
        }

        #logout-btn:hover {
            background: #ff4444;
            color: white;
            box-shadow: 0 0 15px #ff4444;
        }

        /* --- ZONE DES MESSAGES --- */
        #messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Scrollbar futuriste (PC) */
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        #messages::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; box-shadow: 0 0 10px var(--neon-blue); }

        .message-bulle {
            background: rgba(255,255,255,0.03);
            padding: 15px 20px;
            border-radius: 20px 20px 20px 5px;
            max-width: 75%;
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-left: 4px solid var(--neon-blue);
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            word-wrap: break-word;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transform-origin: bottom left;
        }

        .message-bulle.me {
            align-self: flex-end;
            border-radius: 20px 20px 5px 20px;
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-left: 1px solid rgba(255, 0, 255, 0.2);
            border-right: 4px solid var(--neon-pink);
            background: rgba(255, 0, 255, 0.03);
            transform-origin: bottom right;
        }

        .msg-pseudo {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .message-bulle.me .msg-pseudo { text-align: right; color: var(--neon-pink); }
        .message-bulle:not(.me) .msg-pseudo { color: var(--neon-blue); }
        
        .msg-texte {
            font-size: 1.05rem;
            line-height: 1.4;
        }

        .msg-media img, .msg-media video {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            object-fit: cover;
            cursor: pointer;
            transition: all 0.3s;
        }

        .msg-media img:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }

        /* --- BARRE DE SAISIE --- */
        .chat-input-area {
            display: flex;
            padding: 15px 20px;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            gap: 12px;
            align-items: center;
        }

        .chat-input-area input[type="text"] {
            flex-grow: 1;
            padding: 15px 20px;
            font-size: 1rem;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            background: rgba(255,255,255,0.03);
            border-radius: 25px;
            outline: none;
            transition: 0.3s;
        }
        
        .chat-input-area input[type="text"]:focus {
            background: rgba(255,255,255,0.08);
            border-color: rgba(0, 243, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .file-upload-btn, .send-btn {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            outline: none;
        }

        .file-upload-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            font-size: 1.5rem;
        }

        .file-upload-btn:hover { background: rgba(0, 243, 255, 0.1); box-shadow: 0 0 15px var(--neon-blue); }

        .file-upload-btn input[type="file"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 100%;
            width: 100%;
        }

        .send-btn {
            background: var(--neon-blue);
            color: black;
            border: none;
            font-size: 1.2rem;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .send-btn:hover { transform: scale(1.1); background: white; box-shadow: 0 0 25px white; }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(20px) scale(0.9); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        /* --- IMAGE EN PLEIN ÉCRAN --- */
        #image-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.3s;
        }

        #img-en-grand {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            cursor: pointer;
            transition: 0.3s;
        }

        .close-modal:hover { color: var(--neon-pink); transform: scale(1.2); }

        .download-btn {
            margin-top: 30px;
            background: transparent;
            color: white;
            border: 2px solid var(--neon-blue);
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .download-btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* =========================================
           ✨ LA MAGIE RESPONSIVE (POUR TÉLÉPHONES) ✨
           ========================================= */
        @media (max-width: 768px) {
            .glass-panel {
                width: 100%;
                height: 100vh; /* Prend 100% de la hauteur de l'écran */
                border-radius: 0; /* On enlève les bords arrondis */
                border: none;
                box-shadow: none;
            }

            .chat-header {
                padding: 12px 15px;
            }

            .message-bulle {
                max-width: 85%; /* Les bulles prennent plus de place sur petit écran */
                padding: 12px 15px;
            }

            .chat-input-area {
                padding: 10px;
                padding-bottom: 20px; /* Un peu d'espace en bas pour les iPhones */
            }

            .chat-input-area input[type="text"] {
                font-size: 16px; /* Empêche le zoom automatique sur iPhone */
                padding: 12px 15px;
            }

            .file-upload-btn, .send-btn {
                width: 45px;
                height: 45px;
            }
        }

    </style>
</head>
<body>

    <div class="glass-panel">
        <div id="login-screen">
            <h1>NEON<span style="color:var(--neon-pink)">CHAT</span></h1>
            <input type="text" id="pseudo-input" class="login-input" placeholder="Ton pseudo..." autocomplete="off">
            <button class="neon-btn" onclick="login()">Connecter</button>
        </div>

        <div id="chat-screen">
            <div class="chat-header">
                <div>👋 <span id="display-pseudo"></span></div>
                <button id="logout-btn" onclick="logout()">Déconnexion</button>
            </div>
            
            <div id="messages"></div>

            <form class="chat-input-area" id="send-form">
                <div class="file-upload-btn" title="Envoyer une image">
                    +
                    <input type="file" id="media-input" accept="image/*,video/*">
                </div>
                <input type="text" id="msg-input" placeholder="Écris un message..." autocomplete="off">
                <button type="submit" class="send-btn" id="send-btn">➤</button>
            </form>
        </div>
    </div>

    <div id="image-modal">
        <span class="close-modal" onclick="fermerModal()">&times;</span>
        <img id="img-en-grand" src="">
        <button class="download-btn" onclick="telechargerImage()">⬇️ Enregistrer l'image</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://exnrseyyxzqjhlabtesu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_aAQhzHqknK1UKWRiLJur0w_E7jAXoDW';
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let monPseudo = localStorage.getItem('neonchat_pseudo');
        if (monPseudo) showChat();

        function login() {
            const inputVal = document.getElementById('pseudo-input').value.trim();
            if (inputVal.length === 0) return;
            monPseudo = inputVal;
            localStorage.setItem('neonchat_pseudo', monPseudo);
            showChat();
        }

        // Permet de se connecter en appuyant sur la touche "Entrée"
        document.getElementById('pseudo-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });

        function logout() {
            localStorage.removeItem('neonchat_pseudo');
            monPseudo = null;
            document.getElementById('chat-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('pseudo-input').value = '';
        }

        function showChat() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('display-pseudo').innerText = monPseudo;
            chargerMessages();
        }

        const messagesDiv = document.getElementById('messages');
        let dernierMessageAffiche = 0; 

        function afficherMessage(msg) {
            const isMe = msg.pseudo === monPseudo;
            const div = document.createElement('div');
            div.className = `message-bulle ${isMe ? 'me' : ''}`;
            
            let html = `<div class="msg-pseudo">${msg.pseudo}</div>`;
            if (msg.texte) html += `<div class="msg-texte">${msg.texte}</div>`;
            
            if (msg.media_url) {
                if (msg.media_type && msg.media_type.startsWith('video/')) {
                    html += `<div class="msg-media"><video controls src="${msg.media_url}"></video></div>`;
                } else {
                    html += `<div class="msg-media"><img src="${msg.media_url}" onclick="ouvrirModal('${msg.media_url}')"></div>`;
                }
            }
            
            div.innerHTML = html;
            messagesDiv.appendChild(div);
        }

        async function chargerMessages() {
            const { data, error } = await db
                .from('chat_global')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (!error && data) {
                if (data.length !== dernierMessageAffiche) {
                    messagesDiv.innerHTML = ''; 
                    data.forEach(afficherMessage);
                    // Défilement automatique vers le bas
                    setTimeout(() => { messagesDiv.scrollTop = messagesDiv.scrollHeight; }, 100);
                    dernierMessageAffiche = data.length;
                }
            }
        }

        document.getElementById('send-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('send-btn');
            btn.disabled = true;
            btn.style.opacity = '0.5';

            const texte = document.getElementById('msg-input').value.trim();
            const mediaInput = document.getElementById('media-input');
            const file = mediaInput.files[0];

            if (!texte && !file) {
                btn.disabled = false;
                btn.style.opacity = '1';
                return;
            }

            let mediaUrl = null;
            let mediaType = null;

            try {
                if (file) {
                    const fileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g, '')}`;
                    mediaType = file.type;
                    const { error: uploadError } = await db.storage.from('medias').upload(fileName, file);
                    if (uploadError) throw uploadError;
                    const { data } = db.storage.from('medias').getPublicUrl(fileName);
                    mediaUrl = data.publicUrl;
                }

                await db.from('chat_global').insert([{ pseudo: monPseudo, texte: texte, media_url: mediaUrl, media_type: mediaType }]);

                document.getElementById('msg-input').value = '';
                mediaInput.value = ''; 
                chargerMessages(); 

            } catch (err) {
                console.error("Erreur:", err);
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        });

        // --- GESTION IMAGE ---
        const modal = document.getElementById('image-modal');
        const imgEnGrand = document.getElementById('img-en-grand');

        function ouvrirModal(url) {
            modal.style.display = 'flex';
            imgEnGrand.src = url;
        }

        function fermerModal() {
            modal.style.display = 'none';
            imgEnGrand.src = ''; 
        }

        async function telechargerImage() {
            const url = imgEnGrand.src;
            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const urlBlob = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = urlBlob;
                a.download = 'neonchat_' + Date.now() + '.jpg'; 
                document.body.appendChild(a);
                a.click(); 
                window.URL.revokeObjectURL(urlBlob); 
            } catch (erreur) {
                window.open(url, '_blank');
            }
        }

        setInterval(() => { if (monPseudo) chargerMessages(); }, 2000);

    </script>
</body>
</html>
