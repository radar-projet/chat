<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Radar-Chat</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            ig: {
              blue: '#0095F6',
              gradient1: '#833AB4',
              gradient2: '#FD1D1D',
              gradient3: '#F56040',
              bg: '#FAFAFA',
              border: '#DBDBDB',
              text: '#262626',
              muted: '#8E8E8E'
            }
          },
          animation: {
            'pop': 'pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
            'like': 'like 0.6s ease-in-out',
          },
          keyframes: {
            pop: {
              '0%': { transform: 'scale(0.95)', opacity: '0' },
              '100%': { transform: 'scale(1)', opacity: '1' },
            },
            like: {
              '0%, 100%': { transform: 'scale(1)' },
              '50%': { transform: 'scale(1.3)' },
            }
          }
        },
      },
    };
  </script>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    [v-cloak] { display: none !important; }
    html, body { overscroll-behavior: none; -webkit-tap-highlight-color: transparent; }
    
    /* Scrollbar invisible type mobile */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Transitions Vue */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    
    .msg-enter-active { transition: all 0.4s cubic-bezier(0.25, 1.2, 0.2, 1); }
    .msg-enter-from { opacity: 0; transform: translateY(15px) scale(0.98); }
    .msg-move { transition: transform 0.4s ease; }

    /* Bulle gradient IG */
    .bg-ig-gradient { background: linear-gradient(135deg, #833AB4, #FD1D1D, #F56040); }
  </style>
</head>
<body class="font-sans bg-white text-ig-text antialiased">

<div id="app" v-cloak></div>

<script type="text/x-template" id="tmpl-login">
  <div class="min-h-screen flex items-center justify-center bg-ig-bg px-4 py-8">
    <div class="w-full max-w-sm flex flex-col items-center">
      <div class="w-16 h-16 rounded-2xl bg-ig-gradient flex items-center justify-center mb-6 shadow-lg">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
      </div>
      
      <div class="bg-white w-full rounded-lg border border-ig-border p-8 text-center shadow-sm">
        <h1 class="text-2xl font-semibold mb-6">Radar-Chat</h1>
        <form @submit.prevent="submit">
          <input
            ref="inputEl"
            v-model="name"
            type="text"
            placeholder="Nom d'utilisateur"
            maxlength="20"
            class="w-full px-3 py-2.5 bg-ig-bg border border-ig-border rounded text-sm outline-none focus:border-ig-muted transition-colors mb-4"
          >
          <button type="submit" class="w-full py-2 bg-ig-blue hover:bg-blue-600 text-white font-semibold rounded text-sm transition-colors">
            Rejoindre le chat
          </button>
        </form>
      </div>
    </div>
  </div>
</script>

<script type="text/x-template" id="tmpl-chat">
  <div class="h-[100dvh] flex flex-col bg-white">
    <header class="flex-shrink-0 border-b border-ig-border h-[60px] flex items-center justify-between px-4 bg-white/90 backdrop-blur z-10">
      <div class="flex items-center gap-3">
        <img :src="`https://ui-avatars.com/api/?name=${pseudo}&background=random&color=fff`" class="w-8 h-8 rounded-full">
        <div>
          <h1 class="text-sm font-semibold leading-tight">{{ pseudo }}</h1>
          <div class="flex items-center gap-1.5 mt-0.5">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span class="text-xs text-ig-muted">{{ onlineCount }} en ligne</span>
          </div>
        </div>
      </div>
      <button @click="$emit('logout')" class="text-ig-text hover:text-red-500 transition-colors">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
      </button>
    </header>

    <div ref="scrollEl" class="flex-1 overflow-y-auto hide-scrollbar bg-white" @scroll="handleScroll">
      <div class="max-w-3xl mx-auto px-4 py-6 flex flex-col gap-4">
        
        <div v-if="loadingHistory" class="flex justify-center py-4">
          <svg class="w-5 h-5 text-ig-muted animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </div>

        <transition-group name="msg">
          <message-bubble
            v-for="msg in messages"
            :key="msg.id"
            :msg="msg"
            :is-me="msg.pseudo === pseudo"
            :reply-context="getReplyContext(msg.reply_to)"
            @open-media="openModal"
            @reply="setReply"
            @like="toggleLike"
          />
        </transition-group>
        <div ref="bottomAnchor" class="h-1"></div>
      </div>
    </div>

    <div class="flex-shrink-0 bg-white border-t border-ig-border pb-safe">
      
      <transition name="fade">
        <div v-if="replyingTo" class="px-4 py-2 bg-ig-bg border-b border-ig-border flex justify-between items-center text-sm">
          <div class="truncate text-ig-muted">
            Réponse à <span class="font-semibold text-ig-text">{{ replyingTo.pseudo }}</span> : 
            {{ replyingTo.texte || 'Média' }}
          </div>
          <button @click="replyingTo = null" class="text-ig-muted hover:text-ig-text">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </transition>

      <transition name="fade">
        <div v-if="pendingFile" class="px-4 py-3 flex items-center gap-3 bg-ig-bg">
          <div class="relative">
            <img v-if="thumbURL" :src="thumbURL" class="w-12 h-12 rounded object-cover border border-ig-border">
            <div v-else class="w-12 h-12 rounded bg-gray-200 flex items-center justify-center">
              <svg class="w-6 h-6 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
            </div>
            <button @click="clearPending" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-0.5"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
          </div>
        </div>
      </transition>

      <div class="px-4 py-3 flex items-end gap-2 max-w-3xl mx-auto">
        <input type="file" ref="fileEl" accept="image/*,video/*" class="hidden" @change="onFile">
        
        <button @click="fileEl.click()" class="p-2 text-ig-text hover:bg-ig-bg rounded-full transition-colors">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </button>

        <div class="flex-1 bg-ig-bg border border-ig-border rounded-full flex items-center px-4 py-1.5">
          <input
            v-model="text"
            type="text"
            placeholder="Envoyer un message..."
            class="w-full bg-transparent text-sm py-1 outline-none"
            @keydown.enter.prevent="send"
          >
        </div>

        <button @click="send" :disabled="busy || (!text.trim() && !pendingFile)" class="p-2 text-ig-blue disabled:opacity-50 transition-colors font-semibold text-sm">
          <span v-if="!busy">Envoyer</span>
          <svg v-else class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        </button>
      </div>
    </div>

    <transition name="fade">
      <div v-if="modal.show" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 p-4" @click.self="modal.show = false">
        <button @click="modal.show = false" class="absolute top-6 right-6 text-white"><svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg></button>
        <img v-if="modal.type === 'image'" :src="modal.url" class="max-w-full max-h-full object-contain">
        <video v-else :src="modal.url" controls autoplay class="max-w-full max-h-full"></video>
      </div>
    </transition>
  </div>
</script>

<script type="text/x-template" id="tmpl-bubble">
  <div :class="['flex w-full group animate-pop', isMe ? 'justify-end' : 'justify-start']">
    
    <img v-if="!isMe" :src="msg.avatar_url || `https://ui-avatars.com/api/?name=${msg.pseudo}&background=random&color=fff`" class="w-7 h-7 rounded-full mr-2 mt-auto">

    <div class="flex flex-col max-w-[75%]">
      <span v-if="!isMe" class="text-[11px] text-ig-muted ml-1 mb-1">{{ msg.pseudo }}</span>

      <div v-if="replyContext" class="mb-1 px-3 py-1 bg-ig-bg text-[11px] text-ig-muted rounded-lg border border-ig-border truncate cursor-pointer opacity-80" @click="$emit('reply', msg)">
        <span class="font-semibold">{{ replyContext.pseudo }}</span>: {{ replyContext.texte || 'Média' }}
      </div>

      <div class="relative group flex items-center" :class="isMe ? 'flex-row-reverse' : 'flex-row'">
        
        <div
          @dblclick="$emit('like', msg.id)"
          :class="[
            'px-4 py-2.5 text-[15px] leading-snug break-words shadow-sm relative',
            isMe ? 'bg-ig-gradient text-white rounded-2xl rounded-br-sm' : 'bg-white text-ig-text border border-ig-border rounded-2xl rounded-bl-sm'
          ]"
        >
          <div v-if="msg.media_url && !isVideo" class="mb-2 -mx-2 -mt-2 cursor-pointer" @click="$emit('open-media', msg.media_url, 'image')">
            <img :src="msg.media_url" class="max-w-full rounded-xl object-cover" loading="lazy">
          </div>
          <div v-if="msg.media_url && isVideo" class="mb-2 -mx-2 -mt-2">
            <video :src="msg.media_url" controls preload="metadata" playsinline class="max-w-full rounded-xl"></video>
          </div>
          <p v-if="msg.texte" class="whitespace-pre-wrap">{{ msg.texte }}</p>
          
          <div v-if="msg.liked_by && msg.liked_by.length > 0" class="absolute -bottom-2 right-2 bg-white border border-ig-border rounded-full px-1.5 py-0.5 text-[10px] flex items-center gap-1 shadow-sm">
            ❤️ {{ msg.liked_by.length }}
          </div>
        </div>

        <div class="opacity-0 group-hover:opacity-100 transition-opacity flex items-center gap-2 px-2" :class="isMe ? 'mr-1' : 'ml-1'">
          <button @click="$emit('reply', msg)" class="text-ig-muted hover:text-ig-text" title="Répondre"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg></button>
          <button @click="$emit('like', msg.id)" class="text-ig-muted hover:text-red-500" title="Liker"><svg class="w-4 h-4" :fill="isLiked ? 'currentColor' : 'none'" :class="isLiked ? 'text-red-500' : ''" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</script>

<script>
(function () {
  'use strict';
  const { createApp, ref, reactive, computed, watch, onMounted, onUnmounted, nextTick } = Vue;

  // Configuration Supabase
  const SUPABASE_URL = 'https://exnrseyyxzqjhlabtesu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_aAQhzHqknK1UKWRiLJur0w_E7jAXoDW';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // === COMPONENT: Message Bubble ===
  const MessageBubble = {
    name: 'MessageBubble',
    props: { msg: Object, isMe: Boolean, replyContext: Object },
    emits: ['open-media', 'reply', 'like'],
    template: '#tmpl-bubble',
    setup(props) {
      const isVideo = computed(() => props.msg.media_type?.startsWith('video') ?? false);
      const isLiked = computed(() => props.msg.liked_by?.includes(localStorage.getItem('radarchat_user')));
      return { isVideo, isLiked };
    },
  };

  // === COMPONENT: Login Screen ===
  const LoginScreen = {
    name: 'LoginScreen',
    emits: ['login'],
    template: '#tmpl-login',
    setup(_, { emit }) {
      const name = ref('');
      const inputEl = ref(null);
      function submit() {
        if (name.value.trim().length >= 2) emit('login', name.value.trim());
      }
      onMounted(() => nextTick(() => inputEl.value?.focus()));
      return { name, inputEl, submit };
    },
  };

  // === COMPONENT: Chat Screen ===
  const ChatScreen = {
    name: 'ChatScreen',
    props: { pseudo: String },
    emits: ['logout'],
    template: '#tmpl-chat',
    components: { MessageBubble },
    setup(props) {
      const messages = ref([]);
      const text = ref('');
      const pendingFile = ref(null);
      const thumbURL = ref(null);
      const busy = ref(false);
      const fileEl = ref(null);
      const scrollEl = ref(null);
      const bottomAnchor = ref(null);
      const replyingTo = ref(null);
      const modal = reactive({ show: false, url: '', type: 'image' });

      // Infinite Scroll State
      const loadingHistory = ref(false);
      const hasMore = ref(true);
      const PAGE_SIZE = 30;

      // Presence State
      const onlineCount = ref(1);
      let presenceChannel = null;
      let chatChannel = null;

      // Audio notification
      const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

      function scrollToBottom(smooth = true) {
        nextTick(() => {
          if (bottomAnchor.value) {
            bottomAnchor.value.scrollIntoView({ behavior: smooth ? 'smooth' : 'auto' });
          }
        });
      }

      // Load initial messages
      async function loadInitial() {
        loadingHistory.value = true;
        const { data } = await db.from('chat_global')
          .select('*').order('created_at', { ascending: false }).limit(PAGE_SIZE);
        if (data) messages.value = data.reverse();
        loadingHistory.value = false;
        scrollToBottom(false);
      }

      // Load more messages on scroll top
      async function handleScroll(e) {
        if (e.target.scrollTop === 0 && hasMore.value && !loadingHistory.value) {
          loadingHistory.value = true;
          const oldestMsg = messages.value[0];
          const { data } = await db.from('chat_global')
            .select('*').lt('created_at', oldestMsg.created_at)
            .order('created_at', { ascending: false }).limit(PAGE_SIZE);
          
          if (data && data.length > 0) {
            const oldScrollHeight = e.target.scrollHeight;
            messages.value = [...data.reverse(), ...messages.value];
            nextTick(() => { e.target.scrollTop = e.target.scrollHeight - oldScrollHeight; });
          } else {
            hasMore.value = false;
          }
          loadingHistory.value = false;
        }
      }

      // Compression d'image avant upload
      function compressImage(file) {
        return new Promise((resolve) => {
          if (!file.type.startsWith('image/')) return resolve(file);
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = event => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 1080;
              const scale = Math.min(MAX_WIDTH / img.width, 1);
              canvas.width = img.width * scale;
              canvas.height = img.height * scale;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              canvas.toBlob(blob => {
                resolve(new File([blob], file.name, { type: 'image/jpeg' }));
              }, 'image/jpeg', 0.85);
            }
          }
        });
      }

      function onFile(e) {
        const file = e.target.files?.[0];
        if (!file) return;
        pendingFile.value = file;
        if (file.type.startsWith('image/')) {
          const r = new FileReader();
          r.onload = ev => thumbURL.value = ev.target.result;
          r.readAsDataURL(file);
        } else { thumbURL.value = null; }
        e.target.value = '';
      }

      function clearPending() {
        pendingFile.value = null;
        thumbURL.value = null;
        if (fileEl.value) fileEl.value.value = '';
      }

      function setReply(msg) {
        replyingTo.value = msg;
        document.querySelector('input[type="text"]').focus();
      }

      function getReplyContext(replyId) {
        if (!replyId) return null;
        return messages.value.find(m => m.id === replyId) || null;
      }

      // Feature: Toggle Like
      async function toggleLike(msgId) {
        const msg = messages.value.find(m => m.id === msgId);
        if (!msg) return;
        
        let likes = msg.liked_by || [];
        if (likes.includes(props.pseudo)) {
          likes = likes.filter(p => p !== props.pseudo);
        } else {
          likes.push(props.pseudo);
        }
        
        // Optimistic update
        msg.liked_by = likes;
        await db.from('chat_global').update({ liked_by: likes }).eq('id', msgId);
      }

      async function send() {
        if (!text.value.trim() && !pendingFile.value) return;
        busy.value = true;
        try {
          let mediaUrl = null, mediaType = null;
          
          if (pendingFile.value) {
            const file = await compressImage(pendingFile.value);
            const ext = file.name.split('.').pop();
            const key = `${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
            const { data: up, error } = await db.storage.from('medias').upload(key, file);
            if (!error) {
              mediaUrl = db.storage.from('medias').getPublicUrl(up.path).data.publicUrl;
              mediaType = file.type;
            }
          }

          const { data } = await db.from('chat_global').insert({
            pseudo: props.pseudo,
            avatar_url: `https://ui-avatars.com/api/?name=${props.pseudo}&background=random&color=fff`,
            texte: text.value.trim() || null,
            media_url: mediaUrl,
            media_type: mediaType,
            reply_to: replyingTo.value?.id || null
          }).select().single();

          text.value = '';
          clearPending();
          replyingTo.value = null;
          scrollToBottom(true);
        } catch (e) {
          console.error(e);
        }
        busy.value = false;
      }

      function openModal(url, type) {
        modal.url = url; modal.type = type || 'image'; modal.show = true;
      }

      // Realtime logic
      function setupRealtime() {
        // Chat updates
        chatChannel = db.channel('public:chat_global')
          .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_global' }, payload => {
            if (!messages.value.some(m => m.id === payload.new.id)) {
              messages.value.push(payload.new);
              if (payload.new.pseudo !== props.pseudo) {
                audio.play().catch(()=>{}); // Notification sonore pour les autres
                if (Notification.permission === 'granted' && document.hidden) {
                  new Notification(payload.new.pseudo, { body: payload.new.texte });
                }
              }
              scrollToBottom();
            }
          })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chat_global' }, payload => {
             const idx = messages.value.findIndex(m => m.id === payload.new.id);
             if (idx !== -1) messages.value[idx] = payload.new;
          }).subscribe();

        // Presence updates
        presenceChannel = db.channel('online-users');
        presenceChannel.on('presence', { event: 'sync' }, () => {
          const state = presenceChannel.presenceState();
          onlineCount.value = Object.keys(state).length;
        }).subscribe(async (status) => {
          if (status === 'SUBSCRIBED') await presenceChannel.track({ user: props.pseudo });
        });
      }

      onMounted(() => {
        if ('Notification' in window) Notification.requestPermission();
        loadInitial().then(() => setupRealtime());
      });

      onUnmounted(() => {
        if (chatChannel) db.removeChannel(chatChannel);
        if (presenceChannel) db.removeChannel(presenceChannel);
      });

      return {
        messages, text, pendingFile, thumbURL, busy, fileEl, scrollEl, bottomAnchor,
        modal, replyingTo, loadingHistory, onlineCount,
        send, onFile, clearPending, openModal, setReply, getReplyContext, toggleLike, handleScroll
      };
    },
  };

  // === ROOT APP ===
  createApp({
    components: { LoginScreen, ChatScreen },
    setup() {
      const pseudo = ref(localStorage.getItem('radarchat_user') || '');
      const isLoggedIn = computed(() => pseudo.value.length > 0);
      function handleLogin(name) { pseudo.value = name; localStorage.setItem('radarchat_user', name); }
      function handleLogout() { pseudo.value = ''; localStorage.removeItem('radarchat_user'); }
      return { pseudo, isLoggedIn, handleLogin, handleLogout };
    },
    template: `
      <transition name="fade" mode="out-in">
        <login-screen v-if="!isLoggedIn" @login="handleLogin" />
        <chat-screen v-else :pseudo="pseudo" @logout="handleLogout" />
      </transition>
    `,
  }).mount('#app');
})();
</script>
</body>
</html>
